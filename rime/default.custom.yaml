# 个人定制
patch:
  # 只保留全拼
  schema_list:
    - schema: rime_ice

  # 候选词 9 个
  menu/page_size: 5

  # 一个方案时展开选项（不折叠）
  switcher/fold_options: false

  # Caps Lock 切中英（macOS 原生习惯）
  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Caps_Lock: commit_code
      Shift_L: noop
      Shift_R: noop
      Control_L: noop
      Control_R: noop
