# 鼠须管个人定制
patch:
  style:
    color_scheme: macos_light
    color_scheme_dark: macos_dark
    candidate_list_layout: stacked    # 竖排
    inline_preedit: true              # 编码嵌入光标处
    inline_candidate: false

  # 仿 macOS 原生输入法 - 亮色
  preset_color_schemes/macos_light:
    name: "macOS Light"
    font_face: ""
    font_point: 17
    label_font_point: 14
    comment_font_point: 14
    corner_radius: 7
    hilited_corner_radius: 7
    border_height: 5
    border_width: 5
    line_spacing: 6
    back_color: 0xECECEC
    border_color: 0xD0D0D0
    candidate_text_color: 0x262626
    label_color: 0x999999
    comment_text_color: 0x999999
    text_color: 0x262626
    hilited_text_color: 0x262626
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_back_color: 0xD85A00
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0xFFFFFF

  # 仿 macOS 原生输入法 - 暗色
  preset_color_schemes/macos_dark:
    name: "macOS Dark"
    font_face: ""
    font_point: 17
    label_font_point: 14
    comment_font_point: 14
    corner_radius: 7
    hilited_corner_radius: 7
    border_height: 5
    border_width: 5
    line_spacing: 6
    back_color: 0x3B3B3B
    border_color: 0x4A4A4A
    candidate_text_color: 0xEBEBEB
    label_color: 0x7B7B7B
    comment_text_color: 0x7B7B7B
    text_color: 0xEBEBEB
    hilited_text_color: 0xEBEBEB
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_back_color: 0xD15900
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0xFFFFFF

